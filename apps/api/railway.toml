# Railway configuration for the Assembly FastAPI backend.
#
# Project root on Railway should be set to `apps/api`.
# Railway's Nixpacks builder will detect Python from pyproject.toml
# and install with `pip install -e .` (or `uv sync` if uv is
# installed in the build image). The Procfile in this directory
# tells Railway how to start uvicorn.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "uvicorn assembly.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
