# Railway configuration for the Assembly FastAPI backend.
#
# Project root on Railway should be set to `apps/api`.
# Railway's Nixpacks builder will detect Python from pyproject.toml
# and install with `pip install -e .` (or `uv sync` if uv is
# installed in the build image). The Procfile in this directory
# tells Railway how to start uvicorn.

[build]
builder = "NIXPACKS"

[deploy]
# Run Alembic migrations BEFORE starting the API. Idempotent on every
# deploy: if the DB is already at head, `alembic upgrade head` is a
# no-op. If a new migration ships in the next deploy, this runs it
# automatically.
# Use absolute paths to the venv binaries. Nixpacks installs deps
# into /opt/venv/ and adds the venv to PATH only for login shells
# via ~/.profile — the start command runs in a non-interactive
# /bin/bash -c shell that doesn't source .profile, so a plain
# `alembic` lookup fails with "command not found".
# Use `python -m alembic` / `python -m uvicorn` instead of the bare
# console-script binaries. The bin/ shims sometimes go missing
# under Nixpacks builds (we've seen "/opt/venv/bin/alembic: No
# such file or directory" even when the package is installed),
# but module entry-points are reliable as long as the package
# is importable.
startCommand = "/opt/venv/bin/python -m alembic upgrade head && /opt/venv/bin/python -m uvicorn assembly.main:app --host 0.0.0.0 --port $PORT"
# Migrations can take a few seconds on first deploy. Give the health
# probe extra runway before it marks the service unhealthy.
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
